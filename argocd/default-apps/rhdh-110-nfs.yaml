apiVersion: v1
kind: Namespace
metadata:
  name: rhdh-loadtests-110-nfs
  labels:
    argocd.argoproj.io/managed-by: openshift-gitops
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: openshift-gitops
  name: rhdh-loadtests-110-nfs
spec:
  project: rhdh-loadtests
  source:
    repoURL: 'https://github.com/redhat-developer/rhdh-loadtest.git'
    targetRevision: HEAD
    path: helm/rhdh-110-nfs
  destination:
    name: in-cluster
    namespace: rhdh-loadtests-110-nfs
  syncPolicy:
    automated:
      enabled: true
