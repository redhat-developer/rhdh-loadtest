redhat-developer-hub:
  route:
    enabled: false

  upstream:
    backstage:
      appConfig:
        app:
          title: RHDH 1.10 NFS loadtest
          packages: all
          extensions:
            - page:home:
                config:
                  path: /
            - page:catalog:
                config:
                  path: /catalog

        auth:
          providers:
            guest:
              dangerouslyAllowOutsideDevelopment: true

        catalog:
          locations:
            - type: url
              target: https://github.com/redhat-developer/rhdh-loadtest/blob/main/catalog/guest-login.yaml
              rules:
                - allow: [User, Group]
            - type: url
              target: https://github.com/redhat-developer/rhdh-loadtest/blob/main/catalog/components-1000.yaml
              rules:
                - allow: [Component]
            - type: url
              target: https://github.com/redhat-developer/rhdh-loadtest/blob/main/catalog/groups-100.yaml
              rules:
                - allow: [Group]
            - type: url
              target: https://github.com/redhat-developer/rhdh-loadtest/blob/main/catalog/systems-100.yaml
              rules:
                - allow: [System]
            - type: url
              target: https://github.com/redhat-developer/rhdh-loadtest/blob/main/catalog/apis-100.yaml
              rules:
                - allow: [API]
            - type: url
              target: https://github.com/redhat-developer/rhdh-loadtest/blob/main/catalog/templates-100.yaml
              rules:
                - allow: [Template]

        permission:
          enabled: false
          rbac:
            pluginsWithPermission:
              - catalog
              - permission
              - scaffolder
            # policyFileReload: true
            # policies-csv-file: ./rbac/rbac-policies.csv
            # conditionalPoliciesFile: ./rbac-conditions/rbac-conditional-policies.yaml
            admin:
              users:
                - name: user:default/rhdh-qe

      extraEnvVars:
        # defaults
        - name: BACKEND_SECRET
          valueFrom:
            secretKeyRef:
              key: backend-secret
              name: '{{ include "janus-idp.backend-secret-name" $ }}'
        - name: POSTGRESQL_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: postgres-password
              name: '{{- include "janus-idp.postgresql.secretName" . }}'
        # load route host (app and backend baseUrl)
        - name: APP_CONFIG_app_baseUrl
          valueFrom:
            configMapKeyRef:
              name: rhdh-baseurl-configmap
              key: APP_CONFIG_app_baseUrl
        - name: APP_CONFIG_backend_baseUrl
          valueFrom:
            configMapKeyRef:
              name: rhdh-baseurl-configmap
              key: APP_CONFIG_backend_baseUrl
        - name: BASEURL
          valueFrom:
            configMapKeyRef:
              name: rhdh-baseurl-configmap
              key: BASEURL
        # added to enable NFS
        - name: BACKSTAGE_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: rhdh-baseurl-configmap
              key: BACKSTAGE_LOG_LEVEL
        - name: APP_CONFIG_app_packageName
          valueFrom:
            configMapKeyRef:
              name: rhdh-baseurl-configmap
              key: APP_CONFIG_app_packageName
        - name: ENABLE_STANDARD_MODULE_FEDERATION
          valueFrom:
            configMapKeyRef:
              name: rhdh-baseurl-configmap
              key: ENABLE_STANDARD_MODULE_FEDERATION
